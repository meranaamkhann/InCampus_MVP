spring:
  application:
    name: incampus-backend
  profiles:
    active: dev
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-env-should-be-256-bits-minimum-xxxxxxxxxx}
    access-token-expiry-ms: 900000        # 15 min
    refresh-token-expiry-ms: 1209600000   # 14 days
  auth:
    allowed-email-domains: .edu,.ac.in
    otp-expiry-minutes: 10
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
  rate-limit:
    auth-requests-per-minute: 10
    post-requests-per-minute: 20

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
